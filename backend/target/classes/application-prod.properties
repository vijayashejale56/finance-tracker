# ═══════════════════════════════════════
# Production Configuration
# All values MUST come from env variables
# ═══════════════════════════════════════

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool tuning for production
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA — never show SQL in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry=${JWT_ACCESS_EXPIRY:900000}
app.jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRY:604800000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
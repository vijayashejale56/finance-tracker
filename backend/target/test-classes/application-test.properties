# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Disable Flyway
spring.flyway.enabled=false

# JWT — must match EXACTLY the property names in JwtUtil.java
app.jwt.secret=testSecretKeyThatIsAtLeast64CharactersLongForTestingPurposesOnly12345
app.jwt.expiration-ms=900000
app.jwt.access-token-expiry=900000
app.jwt.refresh-token-expiry=604800000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Disable mail
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Logging
logging.level.root=ERROR
logging.level.com.financetracker=INFO

# Disable rate limiting in tests completely
app.rate-limit.enabled=false

# Rate limit — very high in tests so it never triggers
app.rate-limit.login-capacity=1000
app.rate-limit.login-refill-seconds=1

# Disable mail in tests
app.mail.enabled=false
spring.mail.host=localhost
spring.mail.port=25
app.mail.from=test@test.com



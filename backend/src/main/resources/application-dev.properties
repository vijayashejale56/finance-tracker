# ═══════════════════════════════════════
# Development Configuration
# ═══════════════════════════════════════

# Database — reads from env var, falls back to local default
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/financetracker}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# JWT
app.jwt.secret=${JWT_SECRET:devSecretKeyThatIsAtLeast64CharactersLongForHMACSHA512Algorithm!!}
app.jwt.access-token-expiry=${JWT_ACCESS_EXPIRY:900000}
app.jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRY:604800000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173}

# Mail (disabled in dev)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT
app.jwt.secret=thisIsAVeryLongSecretKeyForFinanceTrackerJWTThatIsAtLeast64CharactersLong1234567890ABCDEF
app.jwt.expiration-ms=86400000
app.jwt.access-token-expiry=86400000
app.jwt.refresh-token-expiry=604800000

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true


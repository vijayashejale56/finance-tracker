<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9fafb;
    }

    .container {
      max-width: 560px;
      margin: 40px auto;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 32px;
      text-align: center;
    }

    .header h1 {
      color: white;
      margin: 0;
      font-size: 22px;
    }

    .header p {
      color: rgba(255, 255, 255, 0.85);
      margin: 8px 0 0;
    }

    .body {
      padding: 32px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      padding: 14px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-card.income {
      background: #f0fdf4;
    }

    .stat-card.expense {
      background: #fef2f2;
    }

    .stat-card.savings {
      background: #eff6ff;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .income .stat-label {
      color: #166534;
    }

    .expense .stat-label {
      color: #991b1b;
    }

    .savings .stat-label {
      color: #1e40af;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
    }

    .income .stat-value {
      color: #16a34a;
    }

    .expense .stat-value {
      color: #dc2626;
    }

    .savings .stat-value {
      color: #2563eb;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: #1f2937;
      margin: 20px 0 10px;
    }

    .budget-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .budget-cat {
      font-size: 13px;
      color: #374151;
    }

    .budget-status {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }

    .status-safe {
      background: #dcfce7;
      color: #166534;
    }

    .status-warning {
      background: #fef9c3;
      color: #854d0e;
    }

    .status-exceeded {
      background: #fee2e2;
      color: #991b1b;
    }

    .footer {
      padding: 20px 32px;
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      border-top: 1px solid #f3f4f6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>📊 Monthly Report</h1>
      <p th:text="${monthName + ' ' + year + ' Summary'}">May 2026 Summary</p>
    </div>
    <div class="body">
      <p style="font-size:14px;color:#4b5563;margin:0 0 20px;">
        Hi <strong th:text="${fullName}">User</strong>, here's your financial summary for <span
          th:text="${monthName}">May</span>.
      </p>

      <div class="stats-grid">
        <div class="stat-card income">
          <div class="stat-label">Income</div>
          <div class="stat-value" th:text="${'₹' + income}">₹85,000</div>
        </div>
        <div class="stat-card expense">
          <div class="stat-label">Expenses</div>
          <div class="stat-value" th:text="${'₹' + expenses}">₹13,500</div>
        </div>
        <div class="stat-card savings">
          <div class="stat-label">Saved</div>
          <div class="stat-value" th:text="${'₹' + savings}">₹71,500</div>
        </div>
      </div>

      <div class="section-title">Budget Status</div>
      <div th:each="budget : ${budgets}">
        <div class="budget-row">
          <span class="budget-cat" th:text="${budget.category}">Food</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <span style="font-size:12px;color:#6b7280;" th:text="${'₹' + budget.spent + ' / ₹' + budget.limit}">
              ₹4,250 / ₹5,000
            </span>
            <span class="budget-status"
              th:classappend="${budget.status == 'EXCEEDED'} ? 'status-exceeded' : (${budget.status == 'WARNING'} ? 'status-warning' : 'status-safe')"
              th:text="${budget.status}">
              SAFE
            </span>
          </div>
        </div>
      </div>
    </div>
    <div class="footer">
      Finance Tracker Monthly Report · <span th:text="${monthName + ' ' + year}">May 2026</span>
    </div>
  </div>
</body>

</html>

# ═══════════════════════════════════════
# Production Configuration
# All values MUST come from env variables
# ═══════════════════════════════════════

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver



# Connection pool tuning for production
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA — never show SQL in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# JWT
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry=${JWT_ACCESS_EXPIRY:900000}
app.jwt.refresh-token-expiry=${JWT_REFRESH_EXPIRY:604800000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS}

# Rate limiting
app.rate-limit.login-capacity=${RATE_LIMIT_LOGIN_CAPACITY:5}
app.rate-limit.login-refill-seconds=${RATE_LIMIT_LOGIN_REFILL:60}
app.rate-limit.api-capacity=${RATE_LIMIT_API_CAPACITY:100}

# Server — Render injects PORT env variable
server.port=${PORT:8080}

# Mail
app.mail.enabled=${APP_MAIL_ENABLED:false}
app.mail.from=${APP_MAIL_FROM:noreply@financetracker.com}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator — health check
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Logging — minimal in production
logging.level.com.financetracker=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.root=WARN



version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: financetracker-db

    restart: unless-stopped
    environment:
      POSTGRES_DB: financetracker
      POSTGRES_USER: ftuser
      POSTGRES_PASSWORD: ftpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ftuser -d financetracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: financetracker-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@financetracker.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
